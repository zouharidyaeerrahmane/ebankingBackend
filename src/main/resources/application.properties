server.port=8084

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# =========================
# JWT
# =========================
jwt.secret=CHANGE_ME_32_CHARS_MIN

# =========================
# GROQ API
# =========================
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=CHANGE_ME
groq.chat.model=llama-3.3-70b-versatile
groq.chat.temperature=0.3
groq.chat.max-tokens=1024

# =========================
# TELEGRAM BOT
# =========================
telegram.bot.token=CHANGE_ME

# =========================
# SECRETS LOCAUX (gitignore)
# Copier application-local.properties.example -> application-local.properties
# =========================
spring.config.import=optional:application-local.properties
